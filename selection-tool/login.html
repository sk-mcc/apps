<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - Selection Tool</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <div class="container" id="main-content">
    <header>
      <h1>Selection Tool</h1>
      <p class="subtitle">Sign in to continue</p>
      <nav class="nav-links">
        <a href="index.html" class="nav-link">All Tools</a>
      </nav>
    </header>

    <main>
      <form id="login-form" class="login-form" novalidate>
        <div class="form-group">
          <label for="email" class="form-label">Email</label>
          <input type="email" id="email" class="form-input" autocomplete="email" required>
        </div>
        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <input type="password" id="password" class="form-input" autocomplete="current-password" required>
        </div>
        <div class="error-message" id="login-error" role="alert"></div>
        <button type="submit" class="btn btn-primary" id="login-btn">Sign In</button>
      </form>
    </main>
  </div>

  <script type="module">
    import { login, redirectIfAuthenticated } from './js/auth.js';

    // If already authenticated, redirect to the intended page
    const params = new URLSearchParams(window.location.search);
    const redirectUrl = params.get('redirect') || 'south.html';
    await redirectIfAuthenticated(redirectUrl);

    const form = document.getElementById('login-form');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('login-btn');
    const errorEl = document.getElementById('login-error');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.classList.remove('visible');
      loginBtn.disabled = true;
      loginBtn.textContent = 'Signing in...';

      try {
        await login(emailInput.value.trim(), passwordInput.value);
        window.location.href = redirectUrl;
      } catch (err) {
        let message = 'Sign in failed. Please try again.';
        if (err.code === 'auth/invalid-credential' || err.code === 'auth/wrong-password') {
          message = 'Invalid email or password.';
        } else if (err.code === 'auth/user-not-found') {
          message = 'No account found with this email.';
        } else if (err.code === 'auth/too-many-requests') {
          message = 'Too many attempts. Please try again later.';
        }
        errorEl.textContent = message;
        errorEl.classList.add('visible');
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
